<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .icon {
      width: 128px;
      height: 128px;
      image-rendering: pixelated;
      margin-bottom: 20px;
      animation: breathe 2s ease-in-out infinite;
    }
    .title {
      color: #e0e0e0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
    }
    .loader {
      width: 120px;
      height: 4px;
      background: #2a2a4a;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .loader-bar {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, #ff6b9d, #c44dff, #ff6b9d);
      background-size: 200% 100%;
      border-radius: 2px;
      animation: slide 1.5s ease-in-out infinite;
    }
    .status {
      color: #888;
      font-size: 12px;
    }
    @keyframes slide {
      0% { transform: translateX(-120px); }
      100% { transform: translateX(300px); }
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <img class="icon" src="../build/icon.png" alt="">
  <div class="title">Robots in a House</div>
  <div class="loader"><div class="loader-bar"></div></div>
  <div class="status">Starting up...</div>
</body>
</html>
